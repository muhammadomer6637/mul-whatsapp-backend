<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MUL Admin Panel</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<div class="topbar">
  <h2>MUL WhatsApp Panel</h2>
</div>

<div class="agent-layout">

  <!-- LEFT -->
  <div class="chat-sidebar">
    <div class="chat-sidebar-header">
      <h3>Chats</h3>
      <span id="chatCountBadge" class="pill-badge">0</span>
    </div>

    <div class="search-wrap">
      <input type="text" id="chatSearch" placeholder="Search..." oninput="filterChats()" />
    </div>

    <div id="chatList" class="chat-list"></div>
  </div>

  <!-- RIGHT -->
  <div class="chat-panel">

    <div id="chatHeader" class="chat-header">
      <h3>Select a chat</h3>
    </div>

    <div id="messages" class="messages"></div>

    <div class="composer">
      <input type="text" id="messageInput" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
      <button onclick="switchToBot()">Bot</button>
    </div>

  </div>

</div>

<script src="admin.js"></script>
</body>
</html>
