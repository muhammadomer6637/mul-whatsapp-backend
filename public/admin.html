<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MUL Admin Panel</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>MUL Panel</h2>
    <button onclick="showSection('dashboard')">Dashboard</button>
    <button onclick="showSection('agent')">Agent Panel</button>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Dashboard -->
    <div id="dashboard" class="section">
      <h2>Dashboard</h2>

      <div class="filters">
        <button onclick="loadDashboard('24h')">24h</button>
        <button onclick="loadDashboard('7d')">7d</button>
        <button onclick="loadDashboard('30d')">30d</button>
      </div>

      <div class="cards" id="stats"></div>

      <h3>Top Programs</h3>
      <table id="programs"></table>

      <h3>Recent Leads</h3>
      <table id="leads"></table>
    </div>

    <!-- Agent Panel -->
    <div id="agent" class="section hidden">
      <h2>Agent Panel</h2>

      <div class="chat-container">

        <!-- Chat List -->
        <div class="chat-list" id="chatList"></div>

        <!-- Chat Window -->
        <div class="chat-window">
          <div id="messages"></div>

          <div class="input-box">
            <input type="text" id="messageInput" placeholder="Type message..." />
            <button onclick="sendMessage()">Send</button>
            <button onclick="switchToBot()">Switch to Bot</button>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
